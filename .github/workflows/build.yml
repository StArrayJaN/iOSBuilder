name: Build iOS IPA

on:
  push:
    branches: [ main, develop, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, develop, master ]
  release:
    types: [ published, created, edited ]
  workflow_dispatch:
    inputs:
      scheme:
        description: 'Build scheme (leave empty for auto-detect)'
        required: false
        default: ''
      configuration:
        description: 'Build configuration'
        required: false
        default: 'Release'
        type: choice
        options:
          - Debug
          - Release

env:
  XCODE_VERSION: '16.0'
  ARCHIVE_PATH: build/archive

jobs:
  detect-project:
    name: Detect Project Configuration
    runs-on: macos-latest
    outputs:
      project-file: ${{ steps.detect.outputs.project-file }}
      file-type: ${{ steps.detect.outputs.file-type }}
      schemes: ${{ steps.detect.outputs.schemes }}
      has-podfile: ${{ steps.detect.outputs.has-podfile }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Run Download Script
        continue-on-error: true
        run: |
          echo "运行 download2.sh..."
          chmod +x download2.sh
          ./download2.sh
      - name: Detect Project Configuration
        id: detect
        run: |
          # 检测 xcworkspace
          workspace=$(find . -maxdepth 2 -name "*.xcworkspace" -type d | head -1)
          if [ -n "$workspace" ]; then
            echo "project-file=$workspace" >> $GITHUB_OUTPUT
            echo "file-type=workspace" >> $GITHUB_OUTPUT
            echo "✅ 检测到 xcworkspace: $workspace"
          else
            # 检测 xcodeproj
            project=$(find . -maxdepth 2 -name "*.xcodeproj" -type d | head -1)
            if [ -n "$project" ]; then
              echo "project-file=$project" >> $GITHUB_OUTPUT
              echo "file-type=project" >> $GITHUB_OUTPUT
              echo "✅ 检测到 xcodeproj: $project"
            else
              echo "❌ 未找到 .xcworkspace 或 .xcodeproj"
              exit 1
            fi
          fi

          # 检测 Podfile
          if [ -f "Podfile" ]; then
            echo "has-podfile=true" >> $GITHUB_OUTPUT
          else
            echo "has-podfile=false" >> $GITHUB_OUTPUT
          fi

          # 获取所有 schemes
          if [ -n "$workspace" ]; then
            schemes=$(xcodebuild -workspace "$workspace" -list -json 2>/dev/null | \
              ruby -e "require 'json'; data=JSON.parse(STDIN.read); puts JSON.generate(data['workspace']['schemes'])" 2>/dev/null || echo "[]")
          else
            schemes=$(xcodebuild -project "$project" -list -json 2>/dev/null | \
              ruby -e "require 'json'; data=JSON.parse(STDIN.read); puts JSON.generate(data['project']['schemes'])" 2>/dev/null || echo "[]")
          fi

          if [ "$schemes" = "[]" ] || [ -z "$schemes" ]; then
            echo "❌ 未找到任何 schemes"
            exit 1
          fi
          echo "schemes=$schemes" >> $GITHUB_OUTPUT
          echo "✅ 检测到 schemes: $schemes"

  build:
    name: Build IPA - ${{ matrix.scheme }}
    needs: detect-project
    runs-on: macos-latest
    strategy:
      matrix:
        scheme: ${{ fromJson(needs.detect-project.outputs.schemes) }}
      fail-fast: false
    env:
      PROJECT_FILE: ${{ needs.detect-project.outputs.project-file }}
      FILE_TYPE: ${{ needs.detect-project.outputs.file-type }}
      HAS_PODFILE: ${{ needs.detect-project.outputs.has-podfile }}
      SCHEME: ${{ matrix.scheme }}
      CONFIGURATION: ${{ github.event.inputs.configuration || 'Release' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Run Download Script
        continue-on-error: true
        run: |
          if [ -f "download.sh" ]; then
            echo "运行 download.sh..."
            chmod +x download.sh
            ./download.sh
          elif [ -f "download2.sh" ]; then
            echo "运行 download2.sh..."
            chmod +x download2.sh
            ./download2.sh
          else
            echo "⚠️ 未找到下载脚本"
          fi

      - name: Debug - List Directory
        run: |
          echo "当前工作目录: $(pwd)"
          echo "目录内容:"
          ls -la
          echo ""
          echo "查找 xcodeproj:"
          find . -maxdepth 2 -name "*.xcodeproj" -type d
          echo ""
          echo "查找 xcworkspace:"
          find . -maxdepth 2 -name "*.xcworkspace" -type d

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.0'
          bundler-cache: true

      - name: Install xcpretty
        run: gem install xcpretty

      - name: Verify Project File
        run: |
          project_file="${{ env.PROJECT_FILE }}"
          echo "验证项目文件: $project_file"

          if [ ! -e "$project_file" ]; then
            echo "❌ 错误: 项目文件不存在: $project_file"
            echo "当前目录内容:"
            ls -la
            exit 1
          fi
          echo "✅ 项目文件存在"

      - name: Install CocoaPods
        if: env.HAS_PODFILE == 'true'
        run: |
          gem install cocoapods
          pod repo update
          pod install

      - name: Build Archive
        run: |
          mkdir -p "${{ env.ARCHIVE_PATH }}"

          if [ "${{ env.FILE_TYPE }}" = "workspace" ]; then
            xcodebuild clean archive \
              -workspace "${{ env.PROJECT_FILE }}" \
              -scheme "${{ env.SCHEME }}" \
              -configuration "${{ env.CONFIGURATION }}" \
              -destination "generic/platform=iOS" \
              -sdk iphoneos \
              -archivePath "${{ env.ARCHIVE_PATH }}/${{ env.SCHEME }}" \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO \
              | xcpretty && exit ${PIPESTATUS[0]}
          else
            xcodebuild clean archive \
              -project "${{ env.PROJECT_FILE }}" \
              -scheme "${{ env.SCHEME }}" \
              -configuration "${{ env.CONFIGURATION }}" \
              -destination "generic/platform=iOS" \
              -sdk iphoneos \
              -archivePath "${{ env.ARCHIVE_PATH }}/${{ env.SCHEME }}" \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO \
              | xcpretty && exit ${PIPESTATUS[0]}
          fi

      - name: Install ldid
        run: brew install ldid

      - name: Extract App
        id: extract
        run: |
          archive_path="${{ env.ARCHIVE_PATH }}/${{ env.SCHEME }}.xcarchive"
          app_path=$(find "$archive_path" -type d -name "*.app" | head -1)

          if [ -z "$app_path" ]; then
            echo "❌ 未找到 .app 文件"
            exit 1
          fi

          echo "app-path=$app_path" >> $GITHUB_OUTPUT
          echo "✅ 找到 app: $app_path"

      - name: Fake Sign
        run: |
          app_path="${{ steps.extract.outputs.app-path }}"

          # 签名所有 frameworks
          find "$app_path" -type d -path '*/Frameworks/*.framework' -exec ldid -S {} \;

          # 签名主应用
          ldid -S "$app_path"

          echo "✅ 伪签名完成"

      - name: Create IPA
        id: create-ipa
        run: |
          app_path="${{ steps.extract.outputs.app-path }}"
          app_name=$(basename "$app_path")
          ipa_name="${{ env.SCHEME }}-${{ env.CONFIGURATION }}-$(date +%Y%m%d-%H%M%S).ipa"

          mkdir -p Payload
          cp -r "$app_path" "Payload/$app_name"
          zip -r "$ipa_name" Payload -x "._*" -x ".DS_Store" -x "__MACOSX" > /dev/null

          echo "ipa-name=$ipa_name" >> $GITHUB_OUTPUT
          echo "✅ IPA 创建完成: $ipa_name"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.SCHEME }}-${{ env.CONFIGURATION }}-ipa
          path: ${{ steps.create-ipa.outputs.ipa-name }}
          retention-days: 30

      - name: Create Release Asset
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ steps.create-ipa.outputs.ipa-name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  summary:
    name: Build Summary
    needs: build
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check Build Status
        run: |
          if [ "${{ needs.build.result }}" = "success" ]; then
            echo "✅ 所有 IPA 构建成功"
          else
            echo "❌ 构建失败，请检查日志"
            exit 1
          fi
